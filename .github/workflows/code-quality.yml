name: Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pylint radon pytest-complexity

    - name: Run Pylint
      id: pylint
      run: |
        pylint src/ --fail-under=7.0 --output-format=text || true

    - name: Check code complexity
      run: |
        radon cc src/ -nb -a
        radon mi src/ -nb -s

    - name: Run tests with complexity warnings
      run: pytest tests/ --complexity=C -v || true

    - name: Generate code statistics
      run: |
        echo "=== Code Statistics ===" 
        find src -name "*.py" | wc -l
        find src -name "*.py" -exec wc -l {} + | tail -1

    - name: Create summary
      run: |
        echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "✓ Code analysis complete" >> $GITHUB_STEP_SUMMARY
