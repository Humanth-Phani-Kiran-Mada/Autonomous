[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

markers =
    unit: Unit tests
    integration: Integration tests  
    slow: Slow running tests
    requires_network: Tests requiring network access
    
asyncio_mode = auto
